<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Movie.css">
    <title>MovieLog</title>
</head>
<body>
    <header>
        <h1 id="title">MovieLog</h1>
    </header>
    <main>
        <div id="movie-list"></div> 
    </main>
</body>
<script>
    const movieList = document.getElementById('movie-list');

    async function getMovies() {
        try {
            const response = await fetch('https://jsonfakery.com/movies/paginated');
            const data = await response.json();
            const movies = data.data; 

            movies.forEach(movie => {
                const card = document.createElement('div');

                const img = movie.poster_path;
                const title = movie.original_title;
                const overview = movie.overview;
                const rating = movie.vote_average;
                const releaseDate = movie.release_date;
                const language = movie.original_language;
                const popularity = movie.popularity;
                    
                // 뽑아낸 데이터들을 HTML 리스트(ul, li) 형태로 조립하기
                card.innerHTML = `
                    <hr>
                    <img src="${img}">
                    <h3>🎬 ${title}</h3>
                    <ul>
                        <li><b>평점 :</b> ${rating}점</li>
                        <li><b>개봉일 :</b> ${releaseDate}</li>
                        <li><b>언어 :</b> ${language}</li>
                        <li><b>인기도 수치 :</b> ${popularity}</li>
                        <li><b>줄거리 :</b> ${overview}</li>
                    </ul>
                `;

                movieList.appendChild(card);
            });
        } catch (error) {
            console.error("데이터 가져오기 실패:", error);
        };
    };

    getMovies();
</script>
</html>
